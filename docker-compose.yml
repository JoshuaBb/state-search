services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       state_search
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d state_search"]
      interval: 5s
      timeout: 5s
      retries: 10

  ingest-dims:
    build:
      context: .
      target: ingest
    command: ["reload-dims"]
    environment:
      APP__DATABASE__URL: postgres://postgres:postgres@db:5432/state_search
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./config:/app/config

  ingest:
    build:
      context: .
      target: ingest
    command: ["reload"]
    environment:
      APP__DATABASE__URL: postgres://postgres:postgres@db:5432/state_search
    depends_on:
      db:
        condition: service_healthy
      ingest-dims:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./exports:/app/exports

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      APP__DATABASE__URL: postgres://postgres:postgres@db:5432/state_search
    depends_on:
      db:
        condition: service_healthy
      ingest:
        condition: service_completed_successfully
